<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Blog
</title>
<style type="text/css">
*{margin:0;padding:0;}
body{background:black;}
canvas{display:block;}
</style>
</head>
<body>
    <div id='container' style='width:1400px'>
        <div id="header" style="background-color:Black;">
            <a href="https://tianrui-huang.github.io">HOME</a><span style="color:White;"><h1 align="center" style="margin-bottom:0;">Blog</h1></span></div>
        </div>
    </div>

<canvas id="c"></canvas>
<script type="text/javascript">
var c=document.getElementById("c");
var ctx= c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;
var chinese="杨苏成很帅";
chinese=chinese.split("");
var font_size=10;
var columns=c.width/font_size;
var drops=[];
for(var i=0;i<columns;i++)
	drops[i]=1;
function draw(){
	ctx.fillStyle="rgba(0,0,0,0.05)";
	ctx.fillRect(0,0,c.width,c.height);
	ctx.fillStyle="#0F0";
	ctx.font=font_size+"px arial";
	for(var i=0;i<drops.length;i++){
	var text=chinese[Math.floor
(Math.random()*chinese.length)];
ctx.fillText(text,i*font_size,drops[i]*font_size);
if(drops[i]*font_size>c.height&&Math.random()>0.975)
	drops[i]=0;
	drops[i]++;
	}
}
setInterval(draw,50);
</script>
<div id="menu" style="background-color:grey;height:700px;width:200px;float:left;">
                <b>菜单</b><br>
                <a href="Blog.html" target="iframe_a">Blog_1<br>
                    <div id="content" style="background:green;height:700px;width:1200px;float:right;">
                        <iframe src="Blog.html" frameborder="0" name="iframe_a"></iframe></div>

</body>
</html>
